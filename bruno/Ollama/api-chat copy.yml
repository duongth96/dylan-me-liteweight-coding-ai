runtime:
  variables:
    - name: clear_vars
      value: "true"
      disabled: true
    - name: user_query
      value: I have error when npm start my project, need you fix it
      disabled: true
    - name: tool_result
      value: '{"results":["package-lock.json","src\server.js","package.json"]}'
      disabled: true
  scripts:
    - type: before-request
      code: |-
        bru.deleteAllVars();

        // # 1. prompt of system
        const sysPrompt = `you are coding assistant and you in a root project folder.
        you can use tools.
        All tools:
        - list_files(includeExtensions:string[], ignoreExtrensions:string[]) // list all file from root project.
        - read_file(path:string, fromLine:number, toLine?:number, length?:number) // read all content file by relative path.
        - search_code(query:string, resultCount:number) // search code in all file of project.
        - run_command(command:string) // run a command with terminal or cmd.
        - browser(search:string) // search with keyword or enter url to search from internet.

        Example:
        User: need summary project.
        Assistant: {"tool":"list_files",aggruments:{includeExtensions[...],ignoreExtrensions:[...]}}.
        `;

        // # 2. prompt of user
        const userPrompt = `tôi muốn bạn mô tả về dự án`;

        // # 3. executed tool result
        const toolResult = ``;
          
        // 1. Lấy danh sách messages cũ từ biến môi trường/collection (nếu chưa có thì tạo mảng rỗng)
        let messages = bru.getVar("chat_history");
        if (!messages) {
          messages = [];
        }

        if (messages.length === 0) {
          messages.push({ role: "system", content: sysPrompt.trim() });
        }

        let currentUserInput = userPrompt; 
        console.log(currentUserInput);
        if(currentUserInput)
          messages.push({ role: "user", content: currentUserInput });

        let toolContent = toolResult;
        let tools = bru.getVar("extracted_tools");
        if(toolContent && tools && tools.length > 0)
        {
          var tool = tools[0];
          messages.push({role:"tool", name:tool.name, content: toolContent})
        }

        bru.setVar("chat_history", messages);

        bru.setVar("safe_messages", JSON.stringify(messages));
    - type: after-response
      code: |-
        const data = res.getBody();
        const newAssisMessage = data.message;
        const chatHistory = bru.getVar("chat_history")

        bru.setVar("chat_history", [...chatHistory, newAssisMessage]);


        const content = newAssisMessage.content; 

        // Pattern: tìm nội dung giữa ```json và ```
        const jsonPattern = /```json\n([\s\S]*?)\n```/g;

        let match;
        const foundJsons = [];

        while ((match = jsonPattern.exec(content)) !== null) {
          try {
            // match[1] là nội dung text bên trong khối json
            const jsonObject = JSON.parse(match[1].trim());
            foundJsons.push(jsonObject);
          } catch (e) {
            console.error("Lỗi parse JSON:", e);
          }
        }

        // In ra danh sách các tool call tìm được
        console.log(foundJsons);
        bru.setVar("extracted_tools", foundJsons);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

