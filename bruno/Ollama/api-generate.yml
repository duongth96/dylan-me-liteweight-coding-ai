info:
  name: /api/generate
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:11434/api/generate
  body:
    type: json
    data: |-
      {
        "model": "qwen2.5:7b",
        "system": "{{sysPrompt}}",
        "stream": false,
        "prompt":"",
        "context": {{priv_context}},
        "options": {
          "num_keep": 24,
          "seed": 42,

          "num_predict": 512,

          "temperature": 0.2,
          "top_k": 40,
          "top_p": 0.9,
          "min_p": 0.05,
          "typical_p": 1.0,

          "repeat_last_n": 64,
          "repeat_penalty": 1.1,
          "presence_penalty": 0.0,
          "frequency_penalty": 0.0,
          "penalize_newline": false,

          "stop": [
              "\n\n\n",
              "```output",
              "END"
          ],

          "num_ctx": 4096,
          "num_batch": 8,

          "num_gpu": 29,
          "main_gpu": 0,
          "use_mmap": true,
          "num_thread": 8
        }
      }
  auth: inherit

runtime:
  variables:
    - name: sysPrompt
      value: ""
    - name: priv_context
      value: "[]"
  scripts:
    - type: before-request
      code: |-
        bru.setVar(
          "sysPrompt", 
          `
          you are coding assistant.
          you can use tools.
          tools:
          - list_files() // list all files path in project folder.
          - read_file(path:string) // get a file content by file path.
          you need call tool like.
          example:
          \`\`\`tool_calls
          [
            {
              "tool_name":"read_file",
              "args":["src/file.text"]
            }
          ]
          \`\`\`
          `
        );
    - type: after-response
      code: |-
        // 1. Lấy dữ liệu trả về từ API
        const data = res.getBody();

        // 2. Trích xuất trường bạn cần (ví dụ trường 'access_token' hoặc 'id')
        const myValue = data.context; 

        // 3. Lưu vào biến Environment hoặc Runtime để dùng cho các request sau
        // Lưu vào Environment (khuyên dùng nếu cần dùng lâu dài)
        bru.setVar("priv_context", myValue);

        // Hoặc lưu vào Runtime (biến tạm, mất khi tắt Bruno)
        // bru.setVar("my_shared_token", myValue);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

