services:
  ollama:
    profiles: ["nvidia"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "11434:11434"
      - "7681:7681"
    volumes:
      - ./ollama-data:/root/.ollama
    environment:
      - CRE_USER=admin
      - CRE_PASSWORD=password
      - WEBTTY_USER=ollama
      - WEBTTY_PASSWORD=ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all # Hoặc thay 'all' bằng số lượng GPU bạn muốn (ví dụ: 1)
              capabilities: [gpu]
  ollama-igpu:
    profiles: ["igpu"]
    build:
      context: .
      dockerfile: Dockerfile.igpu
    ports:
      - "11434:11434"
      - "7681:7681"
    volumes:
      - ./ollama-data:/root/.ollama
    environment:
      - CRE_USER=admin
      - CRE_PASSWORD=password
      - WEBTTY_USER=ollama
      - WEBTTY_PASSWORD=ollama

  ollama-igpu-linux:
    profiles: ["igpu-linux"]
    build:
      context: .
      dockerfile: Dockerfile.igpu
    ports:
      - "11434:11434"
      - "7681:7681"
    volumes:
      - ./ollama-data:/root/.ollama
    environment:
      - CRE_USER=admin
      - CRE_PASSWORD=password
      - WEBTTY_USER=ollama
      - WEBTTY_PASSWORD=ollama
    devices:
      - /dev/dri:/dev/dri
      
